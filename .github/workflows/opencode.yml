name: OpenCode Issue Assistant

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') || 
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.email "vaceslavlebedev825@gmail.com"
          git config --global user.name "Slovuan-Swan"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@dev
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          provider: openrouter
          model: openrouter/qwen/qwen3-next
          use_github_token: true
