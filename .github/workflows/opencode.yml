name: OpenCode Issue Assistant

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') || 
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run OpenCode
        # Переключаемся на официальную стабильную ветку dev вместо несуществующей v1
        uses: anomalyco/opencode/github@dev
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          model: google/gemini-3.5-flash-lite
