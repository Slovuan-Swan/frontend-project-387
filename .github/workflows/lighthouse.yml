name: Lighthouse Audit

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: # ручной запуск

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Build
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build

      - name: Start application
        run: |
          npm run start:test &
          sleep 10

      - name: Create reports directory
        run: mkdir -p lighthouse-results

      - name: Run Lighthouse on guest page
        run: |
          npx lighthouse http://localhost:5173/ \
            --output=html,json \
            --output-path=./lighthouse-results/guest-index \
            --chrome-flags="--no-sandbox --headless" \
            --max-wait-for-load=30000

      - name: Run Lighthouse on booking page
        run: |
          npx lighthouse http://localhost:5173/book/intro \
            --output=html,json \
            --output-path=./lighthouse-results/guest-booking \
            --chrome-flags="--no-sandbox --headless" \
            --max-wait-for-load=30000

      - name: Run Lighthouse on admin page
        run: |
          npx lighthouse http://localhost:5173/admin/event-types \
            --output=html,json \
            --output-path=./lighthouse-results/admin-event-types \
            --chrome-flags="--no-sandbox --headless" \
            --max-wait-for-load=30000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: lighthouse-results/
          retention-days: 30
